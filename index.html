<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zarabiaj punkty z AdGem</title>
</head>
<body>
  <h1>💎 Twoje punkty</h1>
  <p>Saldo: <span id="balance">Ładowanie...</span></p>

  <!-- Offerwall AdGem -->
  <iframe src="https://wall.adgem.com/?user_id=USER_ID" width="100%" height="600"></iframe>

  <script>
    const userId = "USER_ID"; // ten sam, którego używasz w iframe
    const supabaseUrl = "https://retwfjodylxmdqxhupbz.supabase.co";
    const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJldHdmam9keWx4bWRxeGh1cGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjkwOTIsImV4cCI6MjA4OTgwNTA5Mn0.GpuCY3K2yeepTek0yPWRC1SEotUetDO9NJgr95OnPYw"; // z API Keys → anon key

    async function loadBalance() {
      const res = await fetch(`${supabaseUrl}/rest/v1/users?id=eq.${userId}`, {
        headers: {
          apikey: supabaseAnonKey,
          "Authorization": `Bearer ${supabaseAnonKey}`
        }
      });
      const data = await res.json();
      document.getElementById("balance").innerText = data[0]?.balance ?? 0;
    }

    loadBalance();
  </script>
</body>
</html>
